version: '3.8'

services:
  oss-audit-tools:
    build:
      context: .
      dockerfile: Dockerfile
    image: oss-audit:tools-2.0
    container_name: oss-audit-tools
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
    environment:
      - PYTHONIOENCODING=utf-8
    stdin_open: true
    tty: true
    restart: unless-stopped

networks:
  default:
    name: oss-audit-network

